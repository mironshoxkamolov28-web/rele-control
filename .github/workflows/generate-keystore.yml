name: Generate Android signing keystore (run once)

on:
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a fresh signing key
        run: |
          STORE_PASSWORD=$(openssl rand -hex 16)
          KEY_PASSWORD=$(openssl rand -hex 16)
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias relecontrol \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Rele Control, OU=relenazorat, O=relenazorat, L=, S=, C=UZ"
          base64 -w0 release.keystore > release.keystore.base64
          {
            echo "Bu qiymatlarni GitHub repo Settings > Secrets and variables > Actions bo'limida, quyidagi nomlar bilan bittadan saqlang:"
            echo ""
            echo "ANDROID_KEYSTORE_BASE64 = (release.keystore.base64 faylining ICHIDAGI matn, quyida ham bor)"
            echo "ANDROID_KEYSTORE_PASSWORD = $STORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS = relecontrol"
            echo "ANDROID_KEY_PASSWORD = $KEY_PASSWORD"
            echo ""
            echo "OGOHLANTIRISH: bu faylni xavfsiz joyda saqlang. Kelajakda APK yangilanishlari faqat shu bilan imzolansa, eski o'rnatilgan ilova ustiga to'g'ri yangilanadi. Yo'qotilsa, hamma qurilmalarda ilovani butunlay qayta o'rnatish kerak bo'ladi."
          } > SECRETS-README.txt
      - name: Upload keystore + instructions
        uses: actions/upload-artifact@v4
        with:
          name: android-signing-keystore-SAVE-THIS
          path: |
            release.keystore
            release.keystore.base64
            SECRETS-README.txt
          retention-days: 7
